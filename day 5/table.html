<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <style>
        /* table,th,td{
            border: 1px solid black;
            border-collapse: collapse;  
            padding: 10px;
        } */
        table{
            width: 40px;
            height: 40px;
        }
    </style>
</head>
<body>
    <table border="1" cellpadding="10" cellspacing="10">
    <!-- <table> -->
        <thead>
            <tr>
                <th>SLNO</th>
                <th>NAME</th>
                <th>PHONE</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>PRANITH</td>
                <td>8309118113</td>
            </tr>
        </tbody>
    </table>
</body>
</html>



<!-- 
table tag for table structure
thead tag for table head
tbody for table data/body
tr for table row
th for table header cell(bold&centered)
td for table data(normal cell) 
cellspacing- space between cells to cells
cellpadding--space between cell content and border
-->

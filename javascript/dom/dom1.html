<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body>
    
    <h1>Print Numbers</h1>
    <p id="num"></p>
   
    <script>
       let num= document.getElementById('num');

       let output='';
       for(let i=1;i<=100;i++){
          output=output+ " , "+i;
       }
       num.innerHTML=output;

    </script>
</body>
</html>

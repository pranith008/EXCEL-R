<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops</title>
</head>
<body>
    <script>
        // while loop
        let a=1;
        while(a<=5){
            console.log(a);
            a++;
        }

        // do while loop

        let b=5;
        do{
            console.log(b);
            b++;
            
        }while(b<=7)

        // for loop

        for(let i=1;i<=5;i++){
            console.log(i);
            
        }


    </script>
</body>
</html>

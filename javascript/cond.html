<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conditional Statements</title>
</head>
<body>
    <script>
        let n=10;
        if(n%2==0){
            console.log(n,'is a even number');
            
        }
        // else if statement

        let age=18;
        if(age>=18&&age<=30){
            console.log('you are eligible for army');
        }
        else{
            console.log('you are not eligible for army');
            
        }

        // else if ladder statements

            // syntax : if(condition){

            // }else if(condition){

            // }
            // else if(condition){

            // }else{

            // }

        let marks=prompt('enter the marks=');
        if(marks>=90 && marks<=100){
            console.log("GRADE : A");
        }
        else if(marks<90&&marks>=80){
            console.log("GRADE : B");
        }
        else if(marks<80&&marks>=70){
            console.log("GRADE : C");
        }
        else if(marks<70&&marks>=60){
            console.log("GRADE : D");
        }
        else if(marks<60&&marks>=0) {
            console.log("GRADE : E");
        }
        else{
            console.log("Enter marks in the range of 0-100");
            
        }

    // nested if statements
    // syntax :
    // if(condition){
    //     if (condition){

    //     }else{

    //     }
    // }

    let result=160;
    if(result>=40&&result<=200){
        console.log("Passsed in exam");
        if(result>=150){
            console.log("You got destinction");
            
        }else{
            console.log("You had not got distinction");
            
        }
        
    }
    else{
        console.log("Failed in exam");
        
    }
    
    // switch statements
    // syntax :
        // switch(value/variable){
        //     case :
        //     case : 
        //     case :
        // }

    let day=19;
    switch(day){
        case 1:{
            console.log("Sunday");
            break;
            
        }
        case 2:{
            console.log("Monday");
            break;
            
        }
        case 3:{
            console.log("Tuesday");
            break;
            
        }
        case 4:{
            console.log("Wednesday");
            break;
            
        }
        case 5:{
            console.log("Thursday");
            break;
            
        }
        case 6:{
            console.log("Friday");
            break;
            
        }
        case 7:{
            console.log("saturday");
            break;
            
        }
        default:{
            console.log("Entered wrong day");
            break;
        }
           
            
    }
        
        

    </script>
</body>
</html>

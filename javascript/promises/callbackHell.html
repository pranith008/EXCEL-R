<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Back Hell</title>
</head>
<body>
    <script>
        // preparing lemon water
            // glass of water
            // squeeze lemon into water
            // adding sugar,salt,etc
            // stir and drink

        function step1(){
           setTimeout(()=>{
                 console.log('glass of water');
           },5000 );
            
        }
        function step2(){
            setTimeout(()=>{
                 console.log('squeeze lemon into water');
           },3000 );
            
        }
        function step3(){
            setTimeout(()=>{
                 console.log('adding sugar,salt.etc');
           },2000 );
            
        }
        function step4(){
            setTimeout(()=>{
                  console.log('stir and drink the lemon juice');
           },6000 );
        }
        // calling a function through caller
            // we are not getting output as expected
            //  because we are dealing with time , it changes the output
            // to avoid that we can prefer call back hell
            
        step1();
        step2();
        step3();
        step4();
    </script>
</body>
</html>

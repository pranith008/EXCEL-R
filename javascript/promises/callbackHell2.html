<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call back Hell 2</title>
</head>
<body>
    <script>
        function step1(callback){
           setTimeout(()=>{
                 console.log('glass of water');
                 callback();
           },5000 );
            
        }

        function step2(callback){
            setTimeout(()=>{
                 console.log('squeeze lemon into water');
                 callback();
           },3000 );
            
        }
        function step3(callback){
            setTimeout(()=>{
                 console.log('adding sugar,salt.etc');
                 callback();
           },2000 );
            
        }
        function step4(){
            setTimeout(()=>{
                  console.log('stir and drink the lemon juice');
           },6000 );
        }
        // call back hell / pyramid of doom
        step1(()=>{
            step2(()=>{
                step3(()=>{
                    step4();
                });
            });
        });

// output:
// glass of water
// callbackHell2.html:20 squeeze lemon into water
// callbackHell2.html:27 adding sugar,salt.etc
// callbackHell2.html:34 stir and drink the lemon juice
    </script>
</body>
</html>

        function Student(firstname,lastname,yearofbirth){
            // data/properties/variables
            this.firstname=firstname;
            this.lastname=lastname;
            this.yearofbirth=yearofbirth;

            this.age=()=>{
                return new Date().getFullYear()-this.yearofbirth;
            }
        }
        Student.prototype.fullname=function(){
            return `${this.firstname} ${this.lastname}`;
        }
        let s1=new Student('Narendra','Modi',1962);
        console.log(s1);
        console.log(s1.firstname);
        console.log(s1.lastname);
        console.log(s1.age());

        Student.prototype.email='a@gmail.com';
        console.log(s1.email);
        console.log(s1.fullname());

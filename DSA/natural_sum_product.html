<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum and product of Natural numbers</title>
</head>
<body>
    <script>
        function natural(){
            let sum=0;
            let product=1;
            for(let i=1;i<=10;i++){
                sum+=i;
                product*=i;
            }
            console.log("The sum of first ten natural numbers is",sum);
            console.log("The Product of first ten natural numbers is",product);
        }
        natural();
    </script>
</body>
</html>

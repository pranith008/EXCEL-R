<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even_odd</title>
</head>
<body>
    <script>
        function even_odd(n){
            for(n=1;n<=10;n++){
               if(n%2==0){
                console.log(n,"is a even number");
               }else{
                console.log(n,"is a odd number");
                
               }
            }
        }
        even_odd();

    </script>
</body>
</html>

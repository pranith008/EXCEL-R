<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum_Product</title>
</head>
<body>
    <script>
        let num=153;
        let temp=num;
        function sumdigit(num){
            let sum=0;
            while(num>0){
                let rem=num%10;
                sum+=rem;
                num=Math.floor(num/10);
            }
            console.log("the sum of the digit",temp,"is",sum);            
        }
        function productdigit(num){
            let product=1;
            while(num>0){
                let rem=num%10;
                product*=rem;
                num=Math.floor(num/10);
            }
            console.log("the product of the digit",temp,"is",product);  
        }
        sumdigit(153);
        productdigit(153);
    </script>
</body>
</html>

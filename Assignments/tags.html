<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic and Non-semantic tags</title>
</head>
<body>
    <h2>Welcome to my website!</h2>
    <nav>This is the home page of my website.</nav>
    <h2>About Me</h2>
    <section>My name is John Doe and I'm a web developer</section>
    <ol>
        <li>HTML5</li>
        <li>CSS3</li>
        <li>JavaScript</li>
    </ol>
    <table>
        <tr>
            <td>Row 1,</td>
            <td>Column 1 Row 1,</td>
            <td>Column 2</td>
        </tr>
        <tr>
            <td>Row 2,</td>
            <td>Column 1 Row 2,</td>
            <td>Column 2</td>
        </tr>
    </table>
    <h2>Contact Me</h2>
    <label for="name">Name:</label>
    <input type="text" name="name" id="name"><br><br>
    <label for="email">Email:</label>
    <input type="email" name="email" id="email" ><br><br>
    <label for="message">Message:</label>
    <textarea name="message" id="message" rows="2" columns="15"></textarea><br><br>
    <button type="submit">Send</button>
    <br><br><br>
    <section>Write some content here</section>
    <section>Write some more content here</section>
    


</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Units</title>
    <style>
        .p1{
            width: 100px;
            background-color: green;
        }
        .p2{
            width: 40%;
            background-color: RED;
        }
        .parent{
            border: 1px solid black;
            width: 700px;
        }
    </style>
</head>
<body>
    <p class="p1">100px</p>
    <p class="p2">40%</p>


    <div class="parent">
        <p class="p1">100px</p>
         <p class="p2">40%</p>
    </div>
</body>
</html>

<!-- Absolute units(fixed units)
        px - pixels
        cm
        mm
        in - inches
        pt - points
        pc - picas

    Relative units(responsive units)
        % - percentage
        em
        rem - root em
        vw - viewport width
        vh - viewport height

-->

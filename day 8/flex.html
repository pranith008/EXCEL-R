<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex 1</title>
    <style>
        .parent{
            border: 1px solid black;
            height:600px;
            display: flex;
            flex-direction: column-reverse;
            /* gap:10px ; */
            justify-content: center; 
            align-items: flex-end;

        }
        .item{
            height: 100px;
            width: 100px;
            border: 1px solid black;
            font-size: 40px;
        }
        .one{
            background-color: red;
        }
        .two{
            background-color: aqua;
        }
        .three{
            background-color: yellow;
        }
        .four{
            background-color: palevioletred;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="item one">1</div>
        <div class="item two">2</div>
        <div class="item three">3</div>
        <div class="item four">4</div>
    </div>
</body>
</html>

<!-- flex model is a one -dimensional layout(row/column)
    flex container ---- parent
    flex items ----- child

    parent ---- display: flex
                flex-direction: --change direction

                Main Axis : Direction of flex items  ----  justify-content
                Cross Axis : perpendicular to main  ------  align-items
    
    direction : row
        Main Axis - X axis
        cross axis - y axis

    direction : column
        main axis - y axis
        cross axis - x axis





-->

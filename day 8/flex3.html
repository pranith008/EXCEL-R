<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex 3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        .navbar{
            display: flex;
            justify-content: flex-end;
            height: 120px;
            border: 1px solid black;
            background-color: black;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10000;
            box-shadow: 0 4px 10px rgba(0, 0, 1);
            /* 
            0 -- right
            4px --- down
            10px --- blur
            rgba -- color
            
            */
        }
        .navbar a {
            color:white;
            font-size: 30px;
            text-decoration: none;
            margin: 10px;
        }
        .navbar a:hover{
            text-decoration: underline;
            color: blue;
        }
        .main a:link , .main a:visited{
            color: blue;
        }

        img{
            border-radius: 50%;
            border: 1px solid white;
        }
        .profile{
            margin-right: auto;
            padding: 10px 20px;
        }
        .main{
            height: 600px;
            border: 1px solid black;
            display: flex;
            flex-direction: column;
            justify-content: center;

        }
        .fa-brands{
            border: 1px solid black;
            padding: 10px; 
            font-size: 30px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navItem profile"><img src="./marvels-spider-man-6000x2880-9850.jpg" alt="spiderman" height="100px" width="100px"></div>
        <div class="navItem"><a href="">Home</a></div>
        <div class="navItem"><a href="">Services</a></div>
        <div class="navItem"><a href="">Register</a></div>
        <divclass="navItem"><a href="">Login</a></div>
